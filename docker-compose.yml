# Uncomment to enable datafeeder
#include:
#  - docker-compose.datafeeder.yml

volumes:
  postgresql_data:
  pg_data:
  ldap_data:
  ldap_config:
  geoserver_geodata:
  geoserver_datadir:
  geoserver_tiles:
  geoserver_native_libs:
  mapstore_extensions:
  geonetwork_datadir:
  datafeeder_uploads:
  datafeeder_postgis_data:
  esdata:
  georchestra_datadir:

secrets:
  slapd_password:
    file: ./secrets/slapd_password.txt

networks:
  default:
  # Isolated network: only the gateway and external-proxy sit on it, so the
  # external-proxy container has no route to database/ldap/geoserver/etc.
  # on the default network, even though it proxies arbitrary external URLs.
  external-proxy:

services:
  copy-datadir:
    image: alpine
    command: sh -c "rm -r /etc/georchestra/* ; cp -r -f -v /mnt/datadir/* /etc/georchestra/ ; chmod 777 -R -v /etc/georchestra/" # "sleep 6000"
    volumes:
      - ./config:/mnt/datadir
      - georchestra_datadir:/etc/georchestra

  database:
    image: georchestra/database:latest
    env_file:
      - .envs-database-georchestra
    depends_on:
      copy-datadir:
        condition: service_completed_successfully
    volumes:
      - postgresql_data:/var/lib/postgresql
    restart: always

  ldap:
    image: georchestra/ldap:latest
    depends_on:
      copy-datadir:
        condition: service_completed_successfully
    secrets:
      - slapd_password
    environment:
      - SLAPD_ORGANISATION=georchestra
      - SLAPD_DOMAIN=georchestra.org
      - SLAPD_PASSWORD_FILE=/run/secrets/slapd_password
      - SLAPD_PASSWORD=
      - SLAPD_LOG_LEVEL=32768 # See https://www.openldap.org/doc/admin24/slapdconfig.html#loglevel%20%3Clevel%3E
      - RUN_AS_UID=0
      - RUN_AS_GID=0
      - LDAPHOST=localhost
    env_file:
      - .envs-ldap
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap
    restart: always

  gateway:
    image: georchestra/gateway:latest
    depends_on:
      - database
    networks:
      - default
      - external-proxy
    volumes:
      - georchestra_datadir:/etc/georchestra
    environment:
      - JAVA_TOOL_OPTIONS=-Dgeorchestra.datadir=/etc/georchestra
    env_file:
      - .envs-common
      - .envs-ldap
      - .envs-hosts
      - .envs-database-georchestra

  geoserver:
    image: georchestra/geoserver:latest
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f 'http://localhost:8080/geoserver/ows?SERVICE=WMS&LAYERS=geor:public_layer&FORMAT=image/png&VERSION=1.3.0&SLD_VERSION=1.1.0&REQUEST=GetMap&CRS=EPSG:3857&BBOX=-20820223,-20820223,20820223,20820223&WIDTH=10&HEIGHT=10' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      ldap:
        condition: service_healthy
      database:
        condition: service_healthy
    volumes:
      - georchestra_datadir:/etc/georchestra
      - geoserver_datadir:/mnt/geoserver_datadir
      - geoserver_geodata:/mnt/geoserver_geodata
      - geoserver_tiles:/mnt/geoserver_tiles
      - geoserver_native_libs:/mnt/geoserver_native_libs
    environment:
      - JAVA_OPTIONS=-Dorg.eclipse.jetty.annotations.AnnotationParser.LEVEL=OFF
      - XMS=256M
      - XMX=8G

    env_file:
      - .envs-database-georchestra
      - .envs-database-datafeeder
    restart: always

  console:
    image: georchestra/console:latest
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:8080/console/account/new >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      ldap:
        condition: service_healthy
      database:
        condition: service_healthy
    volumes:
      - georchestra_datadir:/etc/georchestra
    environment:
      - JAVA_OPTIONS=-Dorg.eclipse.jetty.annotations.AnnotationParser.LEVEL=OFF
      - XMS=256M
      - XMX=1G
    env_file:
      - .envs-common
      - .envs-ldap
      - .envs-database-georchestra
      - .envs-hosts
    restart: always

  geonetwork:
    image: georchestra/geonetwork:latest
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:8080/geonetwork/srv/eng/catalog.search >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      console:
        condition: service_healthy
      database:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - georchestra_datadir:/etc/georchestra
      - geonetwork_datadir:/mnt/geonetwork_datadir
    environment:
      - JAVA_OPTIONS=-Duser.home=/tmp/jetty -Dgeorchestra.datadir=/etc/georchestra -Xdebug -Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=5005 -Dorg.eclipse.jetty.annotations.AnnotationParser.LEVEL=OFF
      - XMS=256M
      - XMX=6G
    env_file:
      - .envs-hosts
      - .envs-database-georchestra
      - .envs-elastic
    restart: always
    ports:
      - "5005:5005"

  datahub:
    image: geonetwork/geonetwork-ui-datahub:latest
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:80/datahub/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      copy-datadir:
        condition: service_completed_successfully
    environment:
      ASSETS_DIRECTORY_OVERRIDE: /etc/georchestra/datahub/assets
      CONFIG_DIRECTORY_OVERRIDE: /etc/georchestra/datahub/conf
      CUSTOM_SCRIPTS_DIRECTORY: /etc/georchestra/datahub/scripts
    volumes:
      - georchestra_datadir:/etc/georchestra
    restart: always

  metadata-editor:
    image: geonetwork/geonetwork-ui-metadata-editor:latest
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:80/metadata-editor/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      copy-datadir:
        condition: service_completed_successfully
    environment:
      ASSETS_DIRECTORY_OVERRIDE: /etc/georchestra/metadata-editor/assets
      CONFIG_DIRECTORY_OVERRIDE: /etc/georchestra/metadata-editor/conf
      CUSTOM_SCRIPTS_DIRECTORY: /etc/georchestra/metadata-editor/scripts
    volumes:
      - georchestra_datadir:/etc/georchestra
    restart: always

  mapstore:
    image: georchestra/mapstore:latest
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:8080/mapstore/configs/config.json >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      database:
        condition: service_healthy
      ldap:
        condition: service_healthy
    volumes:
      - georchestra_datadir:/etc/georchestra
      - mapstore_extensions:/mnt/mapstore_extensions
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m -Dgeorchestra.datadir=/etc/georchestra -Dgeorchestra.extensions=/mnt/mapstore_extensions -DPRINT_BASE_URL=pdf
    env_file:
      - .envs-ldap
      - .envs-database-georchestra
    restart: always

  # Scale this service to 1 in order to be able to proxy requests to services where CORS isn't enabled or well configured. 
  # Also edit datahub default.toml and mapstore's localConfig.json to use this proxy iif wanted.
  # Hint: better use this one than mapstore's in order to restrict access to internal network
  external-proxy:
    scale: 0
    image: georchestra/http-proxy:1.5.0-georchestra-01
    networks:
      - external-proxy
    depends_on:
      copy-datadir:
        condition: service_completed_successfully
    environment:
      - PROXY_PROP_PATH=/etc/georchestra/external-proxy/proxy.properties
    volumes:
      - georchestra_datadir:/etc/georchestra

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.13
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 4g
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:$$ELASTIC_PASSWORD -s -f http://localhost:9200/_cat/health  >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    depends_on:
      copy-datadir:
        condition: service_completed_successfully
    env_file:
      - .envs-elastic
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    restart: always

  kibana:
    scale: 0
    image: docker.elastic.co/kibana/kibana:8.14.3
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    environment:
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: changeme
    env_file:
      - .envs-hosts
      - .envs-elastic
    volumes:
      - ./resources/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
    restart: always

  datadb:
    image: postgis/postgis
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: postgres # default database
    volumes:
      - pg_data:/var/lib/postgresql/
    configs:
      - source: datadb_init_sql
        target: /docker-entrypoint-initdb.d/init.sql

configs:
  datadb_init_sql:
    content: |
      CREATE EXTENSION IF NOT EXISTS postgis;
      CREATE SCHEMA IF NOT EXISTS data;
      CREATE SCHEMA IF NOT EXISTS staging;
